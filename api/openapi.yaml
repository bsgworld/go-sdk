- description: |-
    BSG TwoFA API is a RESTful API for two-factor user authentication on a website or web application: you can use it to confirm a transaction, and user contact information, as a second factor in user authentication, and more.
    BSG TwoFA API provides a choice of channel for sending a one-time password (OTP) to a user: SMS or Viber. Connect the channel you need in your personal account on the "Settings" page of the "TwoFA" section and start working with the BSG TwoFA API.

    **Please note:** TwoFA API is not available for use in DEMO account modes (modes in which your account data is not verified).

    Make sure that you have entered all the necessary data in your account settings in order to use the TwoFA service.

    **Be reliable. Use TwoFA**
  name: TwoFA OTP
  x-parent: TwoFA
  x-page-description: "BSG TwoFA API is a RESTful API for two-factor user authentication\
