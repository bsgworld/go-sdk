- description: |
    General rules for sending messages

    - Successful sending of an RCS message is possible only under certain conditions:
      - RCS agent is registered for the client and is in active status
      - Recipient's phone number:
        - supports the ability to receive RCS notifications
        - is not in the RCS stop list (if the stop list check was enabled in the request to send the message)
    - In API requests to send RCS messages, the list of recipients' phone numbers must be unique (no duplicates)
    - The maximum allowed number of contacts in one campaign is 5000
    - If the created campaign contains messages to subscribers from countries that do not match the RCS agent, such messages will not be sent. You will be able to view the campaign statistics and details of its messages after sending

    **Sending RCS messages in the TEST Mode Account**

    In the test mode of the account, the client can send RCS messages on behalf of the test agent (permission to use it must be agreed with the manager in advance).
    Withdrawals for sending RCS messages on behalf of the test agent are made from the client's credit/own funds on the balance sheet.
    Sending an RCS message in test mode is allowed only to a verified contact (the recipient's phone number that has been confirmed by the client via a code).

    **Billing of RCS messages**
    The RCS message is charged at the expense of the client's principal balance and credit limit.
    Billing is performed only for RCS messages with the status Delivered.
    The cost of an RCS message in the customer's tariff depends on the direction of delivery;
    RCS message type (text, single card/carousel).
    If you use an alternative SMS channel, the message is charged at the price of an SMS message according to the connected tariff on your account.
    If the client's balance runs out of funds while sending messages, the created campaign is paused (the campaign is assigned the "Paused" status). After replenishing the balance, to continue sending messages, you need to resume the campaign yourself.

    **Webhook**
    By configuring the URL for the webhook in your personal account on the [Integration and API page](https://app.bsg.world/integration/remote), in the Callback URL For RCS field, you can receive reports with the status of RCS messages sent.
  name: Campaign RCS
  x-parent: RCS Messaging
  x-page-description: General rules for sending RCS messages. Successful sending requires
    an active RCS agent registered for the client and recipient phone number that
    supports RCS notifications. The list of recipients phone numbers must be unique
    with no duplicates. Maximum allowed number of contacts in one campaign is 5000.
    Billing is performed only for RCS messages with status Delivered.
