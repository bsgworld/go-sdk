- description: |
    JWT Token used to authorize API-requests.
    The authorization process is possible upon the availability of a JWT-token, using which each subsequent query to the API should be signed.
    JWT-Token is passed in the header of any request, except when the token itself is received, when this code is not required:
    ```json
    "Authorization": "Bearer: {JWT-token}"
    ```
    To receive a JWT-token, you need to send a request passing the api-key from the "SMPP/API Password" tab of the Integrations & API section in [your personal account](https://app.bsg.world/integration/remote).
