        schema:
          $ref: '#/components/schemas/StoplistSearchField'
        style: form
      - explode: true
        in: query
        name: "search[operator]"
        required: false
        schema:
          $ref: '#/components/schemas/SearchOperator'
        style: form
      - explode: true
        in: query
        name: "search[value]"
        required: false
        schema:
          $ref: '#/components/schemas/SearchValue'
        style: form
      - explode: true
        in: query
        name: "search_fields[0][field]"
        required: false
        schema:
          $ref: '#/components/schemas/StoplistSearchField'
        style: form
      - explode: true
        in: query
        name: "search_fields[0][operator]"
        required: false
        schema:
          $ref: '#/components/schemas/SearchOperator'
        style: form
      - explode: true
        in: query
        name: "search_fields[0][value]"
        required: false
        schema:
          $ref: '#/components/schemas/SearchValue'
        style: form
      responses:
        "200":
