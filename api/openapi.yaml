paths:
  /api/accounts/balance:
    get:
      description: |-
        Platform provides an API to get information about your account balance.
        The request allows you to obtain information about the current balance of your account, including the credit limit
      operationId: account_balance
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance200Response'
          description: Account balance data
      security:
      - ExternalAuth: []
      summary: Get balance
      tags:
      - account_balance
  /api/accounts/tariff:
    get:
      description: |-
        This API allows you to get detailed information about the tariffs for sending SMS and Viber messages, as well as phone Number Verifier requests.

        All rates are specified in the currency that is set in the account settings on the Platform.

        The method transmits information about all available account tariffs for the SMS / 2 Way SMS, Viber, and Number Verifier service
      operationId: account_tariffs
      parameters:
      - explode: true
        in: query
        name: "page[offset]"
        required: false
        schema:
          $ref: '#/components/schemas/PageOffset'
        style: form
      - description: The number of items in the response
        explode: true
        in: query
        name: "page[limit]"
        required: false
        schema:
          default: 50
          example: 50
          maximum: 500
          minimum: 15
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTariffs200Response'
          description: List of the tariffs
      security:
      - ExternalAuth: []
      summary: Get tariffs
      tags:
      - account_tariffs
  /api/auth/login:
    post:
      description: Receive JWT token to use with other method. Use live/test api-key
        to login. JWT-token has limited lifetime and have to be refreshed before become
        expired
      operationId: login
      requestBody:
        content:
          application/json:
            example:
              api_key: live_XXXXXXXXXXXXXXXXXXXX
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSchema'
          description: Successful operation
      summary: Receive JWT token
      tags:
      - login
  /api/auth/refresh:
    post:
      description: Refresh JWT token. Return new JWT-token to new term. It's necessary
        to call when actual JWT-token almost expired
      operationId: refresh_token
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSchema'
          description: Successful operation
      security:
      - ExternalAuth: []
      summary: Refresh JWT token
      tags:
      - refresh_token
  /api/campaigns/price:
    post:
      description: |
        Calculate campaign estimated price before actually [send it](#operation/sms_send)

        **Please note:** Method suitable only for SMS campaigns
      operationId: campaign_price
      requestBody:
        content:
          application/json:
            examples:
              required:
                summary: required
                value:
                  sender: Vet klinika
                  text: hello!
                  messages:
                  - phone: 38267161234
              contact list:
                summary: contact list
                value:
                  sender: Vet klinika
                  text: hello!
                  groups:
                  - 1864275
              tariff:
                summary: tariff
                value:
                  sender: Vet klinika
                  text: hello!
                  messages:
                  - phone: 38267161234
                  tariff_code: 9
            schema:
              $ref: '#/components/schemas/CampaignPriceRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignPrice200Response'
          description: Campaign price
        "422":
          content:
            application/json:
              examples:
                invalid_tariff:
                  description: Pass correct tariff_code or don’t pass at all
                  summary: Tariff was not found
                  value:
                    message: Tariff was not found
                    errors: []
                invalid_data:
                  description: |-
                    The given data was invalid. It can be one of the following:

                    - **This value is too long. It should have 15 characters or less.** - Phone number is incorrect
                  summary: The given data was invalid.
                  value:
                    message: The given data was invalid.
                    errors:
                      messages0phone:
                      - This value is too long. It should have 15 characters or less.
              schema:
                $ref: '#/components/schemas/CampaignPrice422Response'
          description: Error
        "429":
          content:
            application/json:
              examples:
                too_many_requests:
                  summary: too_many_requests
                  value:
                    message: Too many duplicate request detected
              schema:
                $ref: '#/components/schemas/TooManyRequestsResponse'
          description: Too many requests
      security:
      - ExternalAuth: []
      summary: Calculate campaign price
      tags:
      - campaign_price
  /api/campaigns/{id}/detail:
    get:
      description: Campaign detail information and delivery statistics
      operationId: campaign_details
      parameters:
      - example: 53651994
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/Id'
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                details:
                  summary: details
                  value:
                    data:
                      id: 53651994
                      name: SMS api campaign / 2024-04-03 12:14:49
                      sender: testsms
                      status: done
                      type: sms
                      started_at: 2024-04-03 12:14:49
                      actual_start_at: 2024-04-03 12:15:06
                      finished_at: 2024-04-03 12:15:07
                      created_at: 2024-04-03 12:14:49
                      statistics:
                        delivered: 7
                        sent: 0
                        scheduled: 0
                        moderation: 0
                        accepted: 0
                        sending: 0
                        expired: 0
                        failed: 0
                        undelivered: 3
                        unknown: 0
                        read: 0
                        not_viber_user: 0
                        not_rcs_user: 0
                      total_messages: 10
                      total_phones: 10
                      total_price: "0.16"
                      currency: USD
                      alternative_channels: []
              schema:
                $ref: '#/components/schemas/CampaignDetails200Response'
          description: Campaign details
      security:
      - ExternalAuth: []
      summary: Get campaign details
      tags:
      - campaign_details
  /api/campaigns/rcs/send:
    post:
      description: |-
        This method provides the ability to send a single rcs message or to send a mass rcs message.
        It also supports sending messages via an alternative SMS channel if the rcs can’t be delivered
      operationId: rcs_send
      requestBody:
        content:
          application/json:
            examples:
              simple_text:
                summary: simple_text
                value:
                  phones:
                  - number: "380661231231"
                  sender: rcs_sender
                  options:
                    text: Hello! ☺️
              full:
                summary: full
                value:
                  phones:
                  - number: "380661231231"
                    reference_id: f2d37bf77f6242daa83f23b0cc84b627
                  sender: rcs_sender
                  options:
                    cards:
                    - title: The message
