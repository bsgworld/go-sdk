- description: |
    BSG Campaign SMS API is a RESTful API for send both single and group SMS.

    - You can send number of SMS by a single request with the [same text](#operation/sms_send) or use [different text for each number](#operation/sms_send_individual).
    - You can pass list of phone numbers or use address book stored earlier and reused. Try [send-groups](#operation/sms_send_groups)
    - You can use templates to personalize message for every receiver.
    - You can use automatically created [short links](#tag/Short-Links) to detect which of them specifically clicked on the link from your message.
  name: Campaign SMS
  x-parent: SMS Messaging
  x-page-description: BSG Campaign SMS API is a RESTful API for sending both single
    and group SMS. You can send multiple SMS by a single request with the same text
    or use different text for each number. You can pass a list of phone numbers or
    use an address book stored earlier and reused. You can use templates to personalize
    message for every receiver. You can use automatically created short links to detect
    which recipients clicked on the link from your message.
