                single:
                  summary: single
                  value:
                    data:
                    - id: 24142096
                      phone: 38267168999
                      created_at: 2025-03-27 09:05:57
                      sms_stoplist: false
                      viber_stoplist: true
                      rcs_stoplist: false
                    meta:
                      page:
                        limit: 30
                        offset: 0
                        total: 1
                      search:
                        field: phone
                        operator: =
                        value: "38267168999"
