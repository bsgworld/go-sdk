    CountryCode:
      description: Country code according to ISO 3166-1 alpha-2 standard
      example: UA
      type: string
    CreatedAt:
      description: Date when the item was created in the system ― set by the system
        automatically. Display format ― Y-m-d H:i:s
      format: date-time
      type: string
    Currency:
      description: The currency code of the account. Specified according to the ISO-4217
        standard
      example: USD
      type: string
    AlternativeChannel:
      description: The object contains information for sending a message via an alternative
        SMS channel in case of non-delivery with primary channel
      example:
        sms:
          check_stop_list: true
          sender: testsms
          text: Hello! It’s just test message. Please ignore it!
          validity: 43
          validity_seconds: 6946
      properties:
        sms:
          $ref: '#/components/schemas/SmsAltChannel'
      title: AlternativeChannel
      type: object
    SmsAltChannel:
      description: The object contains information about the message for alternative
        delivery via SMS
      example:
        check_stop_list: true
        sender: testsms
        text: Hello! It’s just test message. Please ignore it!
        validity: 43
        validity_seconds: 6946
      properties:
        text:
          description: "SMS text, max length is 765 chars for GSM 7-bit encoding (Latin),\
            \ and 355 for UCS-2"
          example: Hello! It’s just test message. Please ignore it!
          maxLength: 765
          type: string
        sender:
          description: "Sender name. \n\nUp to 11 Latin letters or digits, up to 15\
            \ – only digits. To setup senders visit the [account](https://app.bsg.world/sms/senders)\
            \ or use [sender api](#tag/Senders)"
          example: testsms
          type: string
        validity_seconds:
          description: "Validity period in seconds. If not set, validity field is\
            \ used"
          maximum: 86400
          minimum: 30
          nullable: true
          type: integer
        validity:
          default: 72
          description: validity time in hours. The default is 72 hours. Integer from
            1 to 72
          maximum: 72
          minimum: 1
          type: integer
        check_stop_list:
          default: true
          type: boolean
      required:
      - sender
      - text
      title: Sms
      type: object
    Phone:
      example:
        number: "380661231231"
        reference_id: f2d37bf77f6242daa83f23b0cc84b627
      properties:
        number:
          description: Phone number
          example: "380661231231"
          maxLength: 15
          minLength: 9
          type: string
        reference_id:
          description: |-
            external unique ID. String up to 32 characters containing only alpha numeric characters.

            **Please note:** messages with duplicate reference_id will be rejected
          example: f2d37bf77f6242daa83f23b0cc84b627
          type: string
      required:
      - number
      title: Phone
      type: object
    Card:
      description: Either "media" or "text" is required.
      properties:
        title:
          description: Message title
          maxLength: 200
          type: string
        text:
          description: |-
            It is specified only for the “text” message type.
            RCS message text is up to 1000 characters. Can contain emojis (character count for emojis according to UTF-16 code points.
            Simple emojis take 2 code points, complex emojis take 4, Cyrillic emojis take 1). If the message contains a link in the
            format http://nosms.cc/XXXX, the System will generate an Unsubscribe link while sending the message

            **Please note:** If the message contains a media object, the text parameter is optional and can be omitted
          example: Hello! ☺️
          maxLength: 1000
          minLength: 1
          type: string
        media:
          $ref: '#/components/schemas/Media'
        suggestions:
          description: An array of objects containing information about nested buttons.
            Only up to 2 buttons can be added to a card.
          items:
            $ref: '#/components/schemas/Suggestion'
          maxItems: 4
          type: array
      title: Card
      type: object
    Cards:
      properties:
        cards:
          description: |-
            The array contains information about the card. The maximum number of cards is 5.
            Messages with one card are called “Single card”, messages with 2 or more cards are called “Carousel”.
            Depending on the chosen tariff, the number of cards may be limited (for example, you can send only Single cards).

            Details will be provided by manager.
          items:
            $ref: '#/components/schemas/Card'
          maxItems: 10
          minItems: 1
          type: array
      required:
      - cards
      title: Cards
      type: object
    Media:
      properties:
        url:
          description: |-
            Contains a link to an image or video that will be to be attached to the message.
            The link must begin with http/https.

            Acceptable formats for images/videos:

             - pictures: jpeg, jpg, gif, png
             - videos: h263, m4v, mp4, mpeg, mpeg4, webm
             - size: images – 2 MB, videos – 10 MB
          example: https://example.com
          format: url
          maxLength: 1000
          type: string
      required:
      - url
      title: Media
      type: object
    Options:
      anyOf:
      - $ref: '#/components/schemas/Cards'
      - $ref: '#/components/schemas/Text'
      description: |-
        The object contains information about the message content.

        Either cards or text must be provided
      example:
        text: Hello! Test message
      title: Options
    PostbackData:
      description: Extra data to send on callback_url when user click on the button
      example: press_activate
      maxLength: 25
      type: string
    Suggestion:
      description: "Object describe action when user click on button, it may be call\
        \ to the phone or redirect to the link"
      discriminator:
        mapping:
          link: '#/components/schemas/SuggestionLink'
          call: '#/components/schemas/SuggestionCall'
        propertyName: type
      example:
        text: Example text
      oneOf:
      - $ref: '#/components/schemas/SuggestionLink'
      - $ref: '#/components/schemas/SuggestionCall'
      title: Suggestion
    SuggestionButtonText:
      description: text of the button
      example: Activate
      maxLength: 25
      type: string
    SuggestionCall:
      description: Call when click the button
      properties:
        type:
          description: Suggestion type
          enum:
          - call
          example: call
          type: string
        text:
          description: text of the button
          example: Activate
          maxLength: 25
          type: string
        phone:
          description: |-
            Phone number to call with a click of a button.
            9 – 15 characters (the length must take into account the country code and phone number, the phone number is indicated without +).
            When sending RCS messages to the country of Ukraine, the phone number to call via the button must be a Ukrainian number
          example: "380661231231"
          type: string
        postback_data:
          description: Extra data to send on callback_url when user click on the button
          example: press_activate
          maxLength: 25
          type: string
      required:
      - phone
      - text
      - type
      title: SuggestionCall
      type: object
    SuggestionLink:
      description: Redirect user to url link when click the button
      properties:
        type:
          description: Suggestion type
          enum:
          - link
          example: link
          type: string
        text:
          description: text of the button
          example: Activate
          maxLength: 25
          type: string
        url:
          description: |-
            A link to go through a click on the button. The link should start with http/https.

            If you need to add a button to unsubscribe the user from the mailing list, you can specify a link in the format
            http://nosms.cc/XXXX – the Platform will generate an Unsubscribe link for this action when sending the message.
            When the user clicks on the unsubscribe button, the user’s number will be added to the RCS email stop list.
          example: https://example.com
          format: url
          maxLength: 1000
          type: string
        postback_data:
          description: Extra data to send on callback_url when user click on the button
          example: press_activate
          maxLength: 25
          type: string
      required:
      - text
      - type
      - url
      title: SuggestionLink
      type: object
    Text:
