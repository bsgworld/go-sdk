  /api/2fa/authentications/{id}/cancel:
    post:
      description: "Used to cancel the authentication process. In this case, authentication\
        \ must be in the Pending status."
      operationId: cancel_otp
      parameters:
      - description: "Authentication ID received in response to [POST /api/2fa/authentications/otp](#tag/TwoFA/operation/send_otp)\
          \ The maximum length is 36 characters."
        example: ea5db413-e368-4952-b745-cc2030210c49
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/OtpId'
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                canceled:
                  summary: successfully canceled
                  value:
                    id: ea5db413-e368-4952-b745-cc2030210c49
                    recipient: "61401629754"
                    status: canceled
                    channel: sms
                    sender: SENDER
                    sender_alt: null
                    message_text: "Hi {name}, your OTP is {code2fa}"
                    code_lifetime: 300
                    code_max_tries: 3
                    code_digits: 4
                    price: 0
                    currency: EUR
                    country_code: FR
                    expired_at: 2022-04-28 14:21:16
                    created_at: 2022-04-28 14:21:16
                    finished_at: 2025-02-11 07:59:43
              schema:
                $ref: '#/components/schemas/CancelOtp200Response'
          description: "Successful operation: TwoFA OTP cancellation"
        "404":
          content:
            application/json:
              examples:
                auth_not_found:
                  description: |-
                    This error can occur when the authentication identifier is specified incorrectly or the
                    specified authentication is not present in the system. Please ensure that you are using the correct authentication identifier and try again.
                  summary: Authentication not found
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication not found
              schema:
                $ref: '#/components/schemas/CancelOtp404Response'
          description: Authentication not found
        "422":
          content:
            application/json:
              examples:
                auth_failed:
                  description: This error can occur when attempting to cancel an authentication
                    session that is already completed with a “failed” status. It is
                    only possible to cancel an authentication session while it is
                    in the “pending” status.
                  summary: Authentication failed status
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication failed status
              schema:
                $ref: '#/components/schemas/CancelOtp422Response'
          description: Authentication failed status
        "429":
          content:
            application/json:
              examples:
                too_many_requests:
                  summary: too_many_requests
                  value:
                    message: Too many duplicate request detected
              schema:
                $ref: '#/components/schemas/TooManyRequestsResponse'
          description: Too many requests
      security:
      - ExternalAuth: []
      summary: Cancel the authentication session
      tags:
      - cancel_otp
  /api/2fa/authentications/otp:
    post:
      description: "This API call is used to generate and send a one-time password\
        \ to a user in an SMS or Viber message. **Please note:** authentication of\
        \ recipients who are in the SMS or Viber stop list in your contact book is\
        \ not possible using the corresponding method. (That is, if the recipient\
        \ is in the SMS stop list, then when requesting authentication using the SMS\
        \ method, the one-time password will not be sent, and you will receive an\
        \ error in response)."
      externalDocs:
        description: learn more about 2fa
        url: https://bsg.world/documentations/rest-api/2fa-api
      operationId: send_otp
      requestBody:
        content:
          application/json:
            examples:
              sms:
                summary: OTP by sms
                value:
                  recipient: "61401629754"
                  channel: sms
                  sender: SENDER
                  template_id: "12"
                  code_lifetime: 300
                  code_max_tries: 3
                  code_digits: 5
              viber:
                summary: OTP by viber
                value:
                  recipient: "61401629754"
                  channel: viber
                  sender: VIBER_SENDER
                  sender_alt: SMS_SENDER
                  template_id: "12"
                  code_lifetime: 300
                  code_max_tries: 3
                  code_digits: 5
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                pending:
                  summary: successfully canceled
                  value:
                    id: ea5db413-e368-4952-b745-cc2030210c49
                    recipient: "61401629754"
                    status: pending
                    channel: sms
                    sender: SENDER
                    sender_alt: null
                    message_text: "Hi {name}, your OTP is {code2fa}"
                    code_lifetime: 300
                    code_max_tries: 3
                    code_digits: 5
                    price: 0
                    currency: EUR
                    country_code: FR
                    expired_at: 2022-04-28 14:21:16
                    created_at: 2022-04-28 14:21:16
                    finished_at: null
              schema:
                $ref: '#/components/schemas/SendOtp201Response'
          description: "Successful operation: TwoFA OTP generation & authentication\
            \ session"
        "422":
          content:
            application/json:
              examples:
                invalid_template:
                  description: This error can occur when the template identifier is
                    specified incorrectly or the specified template is not present
                    in the system. Please ensure that you are using the correct template
                    identifier and try again.
                  summary: Template not found
                  value:
                    message: The given data was invalid.
                    errors:
                    - Template is not available.
                invalid_template_status:
                  description: This error occurs when the provided template identifier
                    in the request does not match the “Approved” status.
                  summary: Invalid template status
                  value:
                    message: The given data was invalid.
                    errors:
                    - The recipients phone number is located in a country that is
                      not on the list of countries allowed for the selected template.
                      Please register new message template.
                invalid_channel:
                  description: This error can occur when the channel is specified
                    incorrectly. Please ensure that you are using the correct channel
                    and try again.
                  summary: User channel not found
                  value:
                    message: The given data was invalid.
                    errors:
                      channel:
                      - The value you selected is not a valid choice.
              schema:
                $ref: '#/components/schemas/SendOtp422Response'
          description: The given data was invalid.
        "429":
          content:
            application/json:
              examples:
                too_many_requests:
                  summary: too_many_requests
                  value:
                    message: Too many duplicate request detected
              schema:
                $ref: '#/components/schemas/TooManyRequestsResponse'
          description: Too many requests
      security:
      - ExternalAuth: []
      summary: Send One-time password
      tags:
      - send_otp
  /api/2fa/authentications/otp/{id}/resend:
    post:
      description: |-
        sed to resend the one-time password to the recipient: a new one-time password is generated and
        sent in the message, and the previous one becomes invalid. When resending, already saved data is used to generate the
        OTP from the request [POST /api/2fa/authentications/otp](#tag/TwoFA/operation/send_otp).

        *This API call is available only if the current authentication is not completed before its expiration date
        (the authentication validity period is specified in each TwoFA API response).*
      operationId: resend_otp
      parameters:
      - description: "Authentication ID received in response to [POST /api/2fa/authentications/otp](#tag/TwoFA/operation/send_otp)\
          \ The maximum length is 36 characters."
        example: ea5db413-e368-4952-b745-cc2030210c49
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/OtpId'
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                pending:
                  summary: successfully canceled
                  value:
                    id: ea5db413-e368-4952-b745-cc2030210c49
                    recipient: "61401629754"
                    status: pending
                    channel: sms
                    sender: SENDER
                    sender_alt: null
                    message_text: "Hi {name}, your OTP is {code2fa}"
                    code_lifetime: 300
                    code_max_tries: 3
                    code_digits: 5
                    price: 0
                    currency: EUR
                    country_code: FR
                    expired_at: 2022-04-28 14:21:16
                    created_at: 2022-04-28 14:21:16
                    finished_at: null
              schema:
                $ref: '#/components/schemas/ResendOtp200Response'
          description: "Successful operation: TwoFA OTP resending"
        "404":
          content:
            application/json:
              examples:
                auth_not_found:
                  description: |-
                    This error can occur when the authentication identifier is specified incorrectly
                    or the specified authentication is not present in the system. Please ensure that you are using the correct authentication
                    identifier and try again.
                  summary: Authentication not found
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication not found
              schema:
                $ref: '#/components/schemas/ResendOtp404Response'
          description: Authentication not found
        "422":
          content:
            application/json:
              examples:
                auth_expired:
                  description: This error can occur when attempting to resend the
                    OTP code for an authentication session that has already been completed
                    with a ‘failed’ status. Resending the OTP code is only possible
                    when the authentication session is in the ‘pending’ status.
                  summary: Authentication failed status
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication expired
              schema:
                $ref: '#/components/schemas/ResendOtp422Response'
          description: Authentication failed status
        "429":
          content:
            application/json:
              examples:
                too_many_requests:
                  summary: too_many_requests
                  value:
                    message: Too many duplicate request detected
              schema:
                $ref: '#/components/schemas/TooManyRequestsResponse'
          description: Too many requests
      security:
      - ExternalAuth: []
      summary: Resend the one-time code
      tags:
      - resend_otp
  /api/2fa/authentications/otp/{id}/verify:
    post:
      description: The API call is used to verify that the one-time password you received
        from the user matches the one sent by BSG
      operationId: verify_otp
      parameters:
      - description: "Authentication ID received in response to [POST /api/2fa/authentications/otp](#tag/TwoFA/operation/send_otp)\
          \ The maximum length is 36 characters."
        example: ea5db413-e368-4952-b745-cc2030210c49
        explode: false
        in: path
        name: id
        required: true
        schema:
          $ref: '#/components/schemas/OtpId'
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                canceled:
                  summary: successfully canceled
                  value:
                    id: ea5db413-e368-4952-b745-cc2030210c49
                    recipient: "61401629754"
                    status: verified
                    channel: sms
                    sender: SENDER
                    sender_alt: null
                    message_text: "Hi {name}, your OTP is {code2fa}"
                    code_lifetime: 300
                    code_max_tries: 3
                    code_digits: 4
                    price: 0.02
                    currency: EUR
                    country_code: FR
                    expired_at: 2022-04-28 14:21:16
                    created_at: 2022-04-28 14:21:16
                    finished_at: 2025-02-11 07:59:43
              schema:
                $ref: '#/components/schemas/VerifyOtp200Response'
          description: "Successful operation: TwoFA OTP verifying"
        "404":
          content:
            application/json:
              examples:
                wrong_code:
                  description: |-
                    The error occurs when the provided code does not match the value that
                    was sent to the recipient’s number.
                  summary: Wrong code
                  value:
                    message: TwoFA Service error.
                    errors:
                    - The code does not match the expected value
                auth_not_found:
                  description: |-
                    This error can occur when the authentication identifier is specified incorrectly or the
                    specified authentication is not present in the system. Please ensure that you are using the correct authentication identifier and try again.
                  summary: Authentication not found
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication not found
              schema:
                $ref: '#/components/schemas/VerifyOtp404Response'
          description: Wrong code or authentication not found
        "422":
          content:
            application/json:
              examples:
                auth_not_found:
                  description: Your OTP password has expired. OTP password is no longer
                    valid.
                  summary: Authentication expired
                  value:
                    message: TwoFA Service error.
                    errors:
                    - Authentication expired
              schema:
                $ref: '#/components/schemas/VerifyOtp422Response'
          description: Authentication failed status
        "429":
          content:
            application/json:
              examples:
                too_many_requests:
                  summary: too_many_requests
                  value:
                    message: Too many duplicate request detected
              schema:
                $ref: '#/components/schemas/TooManyRequestsResponse'
          description: Too many requests
      security:
      - ExternalAuth: []
      summary: Check one-time Code
      tags:
      - verify_otp
