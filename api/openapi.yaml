      example:
        id: "3272625618"
        reference: null
        msisdn: "380661231231"
        text: Go to site
        postback: click
        time_click: 2025-04-14T10:56:40
      properties:
        id:
          description: Message ID – a unique identifier automatically generated on
            the Platform when the message is created
          example: 26130
