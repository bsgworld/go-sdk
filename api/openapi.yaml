          example: The given data was invalid.
          type: string
        errors:
          description: |
            It may be one of the following:

            - **The number of requests to create a template is limited to 10. Please wait for the manager approve before making a new request.** You can have no more than 10 templates with the current status “Requested”. If you already have 10 templates with this status, you need to delete one of them to create a new template. Additionally, if any of the existing templates transitions to the “Approved” or “Rejected” status, it also frees up space for creating a new template.
            - **The variable {code2fa} is required in the text** This error occurs when the message template text does not contain the required variable {code2fa} or the variable syntax is incorrect. This variable is intended for inserting the actual OTP code into the message text.
            - **The {code2fa} variable must occur only once in the text** This error occurs when multiple occurrences of the {code2fa} variable are found in the message template text. Please check the entire template text and remove any additional occurrences of the variable.
            - **This action is not available for the account of your type** Creating a message template for sending OTP codes is not allowed in Demo and Test account mode.
            - **User has a template with the identical name!** The template with the specified name in the parameter ‘name’ already exists. Please use names that are distinct from your existing templates.
          items:
            example: "The variable {code2fa} is required in the text"
            type: string
          type: array
