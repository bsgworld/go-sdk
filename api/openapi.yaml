    ActualStartedAt:
      description: Real time when sending the messages starts
      format: date-time
      nullable: true
      type: string
    AddToContactBook:
      default: true
      description: Specifies whether to add the specified phone number of the message
        recipient to the contact book
      type: boolean
    CalculatedPrice:
      description: |-
        estimate campaign cost

        **Please note:** price defined only as the response to create campaign or calculate price requests
      example: 0.0527088
      format: float
      nullable: true
      type: number
    CallbackUrl:
      description: |-
        Link to get the delivery status of messages.
        If this parameter is specified in the method, it will take precedence over the value specified in the “Callback URL” field in the Personal Area.
      maxLength: 100
    CampaignStatus:
      description: "campaign status usually: done"
      enum:
      - creation
      - scheduled
      - sending
      - done
      - paused
      - stopped
      - spam
      - moderation
      type: string
    CheckStopList:
      default: true
      description: "Check the recipient’s phone number for being in the stop list.\n\
        \nPossible values:\n \n - true – if the number is found in the stop list,\
        \ do not send the message\n - false – ignore the stop list"
      type: boolean
    DeliveredAt:
      description: Date and time of receipt of the delivery report response
      format: date-time
      nullable: true
      type: string
    FinishedAt:
      format: date-time
      nullable: true
      type: string
    Id:
      description: campaign unique identifier
      example: 53651994
      type: integer
    MessagePrice:
      description: Message price
      example: "0.10"
      format: float
      type: string
    MessagePriceObject:
      description: Message price value and currency
      example:
        currency: USD
        value: "0.10"
      properties:
        value:
          description: Message price
          example: "0.10"
          format: float
          type: string
        currency:
          description: The currency code of the account. Specified according to the
            ISO-4217 standard
          example: USD
          type: string
      title: MessagePriceObject
      type: object
    MessageStatus:
      description: Message status
      enum:
      - scheduled
      - moderation
      - accepted
      - sending
      - sent
      - delivered
      - expired
      - failed
      - undelivered
      - unknown
      - read
      - not_viber_user
      - not_service_user
      type: string
    MessageText:
      description: Message text to send
      example: Hello! It’s just test message. Please ignore it!
      type: string
    MessageType:
      description: "message type for example: sms"
      enum:
      - sms
      - viber
      - hlr
      - rcs
      - whatsapp
      type: string
    Name:
      description: campaign auto generated name
      example: SMS api campaign / 2024-04-03 12:14:49
      type: string
    RcsSender:
      description: The name of the agent used to send the rcs message
      example: rcs_sender
      maxLength: 40
      minLength: 1
      type: string
    ReferenceId:
      description: |-
        external unique ID. String up to 32 characters containing only alpha numeric characters.

        **Please note:** messages with duplicate reference_id will be rejected
      example: f2d37bf77f6242daa83f23b0cc84b627
      type: string
    RespectCurfew:
      default: false
      description: Check the curfew if it's set up in user settings.
      type: boolean
    Sender:
      description: "Sender’s name: from 3 to 11 characters for the sender’s alphanumeric\
        \ name (Latin letters, symbols, numbers, spaces); 3 to 15 characters for the\
        \ sender’s numeric name. To setup senders visit the [account](https://app.bsg.world/sms/senders)"
      example: testsms
      type: string
    SentAt:
      description: Date and time of sending the message
      format: date-time
      nullable: true
      type: string
    SmsMessageText:
      description: "SMS text, max length is 765 chars for GSM 7-bit encoding (Latin),\
        \ and 355 for UCS-2"
      example: Hello! It’s just test message. Please ignore it!
      maxLength: 765
      type: string
    StartAt:
      description: Start sending the messages at
      format: date-time
      type: string
    TariffCode:
      description: "Tariff code null by default. Your can pass specified one if you\
        \ have several. For more information please visit the [account prices](https://app.bsg.world/prices/sms)"
      example: 9
      type: integer
    TotalMessages:
      description: Total count of messages sent in campaign
      example: 1
      type: integer
    TotalPhones:
      description: Total count if phone numbers in campaign
      example: 1
      type: integer
    TotalPrice:
      description: Total price of all the messages sent in campaign
      example: "0.3000000"
      format: float
      type: string
    Transliterate:
      default: false
      description: apply transliteration to sms text if it necessary
      type: boolean
    UnsubscribeCaption:
      description: Caption before unsubscribe link. Space between caption and link
        is required.
      example: "Unsubscribe: "
      maxLength: 50
      type: string
    Validity:
      default: 72
      description: validity time in hours. The default is 72 hours. Integer from 1
        to 72
      maximum: 72
      minimum: 1
      type: integer
    ValiditySeconds:
      description: |-
        Message validity period in seconds. After this period expires, the message will be in **EXPIRED**
        status or will be redirected to the SMS channel if it was specified in the request. Incompatible with **validity**
      maximum: 86400
      minimum: 30
      type: integer
