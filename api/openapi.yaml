      description: The method allows getting a list of contacts that were added to
        the SMS and/or Viber stop list
      operationId: stoplist_items
      parameters:
      - explode: true
        in: query
        name: "page[offset]"
        required: false
        schema:
          $ref: '#/components/schemas/PageOffset'
        style: form
      - description: The number of items in the response
        explode: true
        in: query
        name: "page[limit]"
        required: false
        schema:
          default: 20
          example: 50
          maximum: 500
          minimum: 15
          type: integer
        style: form
      - description: |-
          Specify the type of the stop list for which we need to return the contact list.
          If the stop list type is not specified, the method will return data for all the stop list types
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - sms
          - viber
          - rcs
          - whatsapp
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoplistItems200Response'
          description: Successful operation
      security:
      - ExternalAuth: []
      summary: List the contacts of stop lists
      tags:
      - stoplist_items
  /api/stoplist/search:
    get:
      description: Search contacts in stop lists by criteria
      operationId: stoplist_search
      parameters:
      - explode: true
        in: query
        name: "page[offset]"
        required: false
        schema:
          $ref: '#/components/schemas/PageOffset'
        style: form
      - description: The number of items in the response
        explode: true
        in: query
        name: "page[limit]"
        required: false
        schema:
          default: 50
          example: 50
          maximum: 500
          minimum: 15
          type: integer
        style: form
      - description: "Sort by conditions: id, phone"
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: id
          enum:
          - id
          - phone
          type: string
        style: form
      - explode: true
        in: query
        name: way
        required: false
        schema:
          $ref: '#/components/schemas/SortWay'
