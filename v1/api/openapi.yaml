    SmsSingleCreateRequest:
      example:
        callback_url_2way: https://your-site.com/sms/incoming
        transliterate: true
        "2way": false
        scheduledDatetime: 2024-12-25T10:30:00Z
        destination: phone
        originator: BSG
        body: Hello! This is a test message from BSG SMS Gateway.
        reference: unique_ref_123
        callback_url: https://your-site.com/sms/delivery-reports
        tariff: 9
        validity: 72
        msisdn: "380953227271"
        data_coding_ucs2: false
      properties:
        destination:
          description: Message destination type for single recipient
          enum:
          - phone
          example: phone
          type: string
        msisdn:
          description: Phone number in international format without + sign. Required
            for destination=phone/otp. Must be 8-15 digits starting with country code
          example: "380953227271"
          maxLength: 15
          minLength: 8
          pattern: "^[1-9][0-9]{7,14}$"
          title: PhoneNumber
          type: string
        reference:
          description: "External reference ID for tracking message. Must be unique.\
            \ Auto-generated if not provided. Only alphanumeric characters, hyphens\
            \ and underscores allowed"
          example: unique_ref_123
          maxLength: 50
          pattern: "^[a-zA-Z0-9_-]+$"
          title: MessageReference
          type: string
        originator:
          description: "Sender's name: from 3 to 11 characters for alphanumeric name\
            \ (Latin letters, symbols, numbers, spaces); 3 to 15 characters for numeric\
            \ name. Required field"
          example: BSG
          maxLength: 15
          minLength: 3
          title: MessageSender
          type: string
        body:
          description: "SMS text content. Maximum length is 765 characters for GSM\
            \ 7-bit encoding (Latin), and 355 characters for UCS-2 (Unicode). Required\
            \ field"
          example: Hello! This is a test message from BSG SMS Gateway.
          maxLength: 765
          minLength: 1
          title: SmsMessageText
          type: string
        callback_url:
          description: HTTPS URL for receiving delivery reports (DLR). Must be accessible
            from our servers. We will POST delivery status updates to this endpoint
          example: https://your-site.com/sms/delivery-reports
          format: uri
          maxLength: 500
          title: DeliveryReportUrl
          type: string
        callback_url_2way:
          description: HTTPS URL for receiving 2-way SMS responses. Only works if
            2way=true and sender supports incoming messages
          example: https://your-site.com/sms/incoming
          format: uri
          maxLength: 500
          title: TwoWayCallbackUrl
          type: string
        transliterate:
          default: false
          description: Apply transliteration to SMS text if necessary. Converts Cyrillic
            characters to Latin equivalents to reduce message cost and ensure delivery
          example: true
          title: MessageTransliterate
          type: boolean
        "2way":
          default: false
          description: Enable two-way SMS communication. Allows recipients to reply
            to your message. Requires callback_url_2way for receiving replies
          example: false
          title: TwoWaySms
          type: boolean
        tariff:
          description: Specific tariff code to use for pricing this message. Optional
            - uses user's default tariff if not specified. Must be a valid tariff
            code available to your account
          example: 9
          maximum: 999
          minimum: 1
          title: TariffCode
          type: integer
        scheduledDatetime:
          description: "Schedule message delivery for future time. Must be in UTC\
            \ format (ISO 8601). Example: 2024-12-25T10:30:00Z. If not specified,\
            \ message is sent immediately"
          example: 2024-12-25T10:30:00Z
          format: date-time
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
          title: ScheduledSendTime
          type: string
        data_coding_ucs2:
          default: false
          description: "Force UCS-2 (Unicode) encoding for message text. Useful for\
            \ non-Latin characters (Cyrillic, Arabic, Chinese, etc). Reduces max message\
            \ length to 355 characters"
          example: false
          title: UnicodeEncoding
          type: boolean
        validity:
          description: "Message validity period in hours. Default is 72 hours (3 days).\
            \ Maximum is 87840 hours (10 years). After this time, undelivered message\
            \ will expire"
          example: 72
          maximum: 87840
          minimum: 1
          title: ValidityPeriod
          type: integer
      required:
      - body
      - destination
      - msisdn
      - originator
      title: SMS Single Phone Request
      type: object
    SmsMultipleCreateRequest:
      properties:
        destination:
          description: Message destination type for multiple recipients
          enum:
          - phones
          example: phones
          type: string
        phones:
          description: Array of phone objects (required for destination=phones). Maximum
            1000 recipients per request
          items:
