    SmsCreateRequest:
      anyOf:
      - $ref: '#/components/schemas/SmsSingleCreateRequest'
      - $ref: '#/components/schemas/SmsMultipleCreateRequest'
      - $ref: '#/components/schemas/SmsIndividualCreateRequest'
      - $ref: '#/components/schemas/SmsOtpCreateRequest'
      description: "Request to send SMS message. Supports four types: single phone,\
        \ multiple phones, individual customized messages, or OTP. Use destination\
        \ field to specify type."
      discriminator:
        mapping:
          phone: '#/components/schemas/SmsSingleCreateRequest'
          phones: '#/components/schemas/SmsMultipleCreateRequest'
          individual: '#/components/schemas/SmsIndividualCreateRequest'
          otp: '#/components/schemas/SmsOtpCreateRequest'
        propertyName: destination
      title: SMS Create Request
    SmsPriceCheckRequest:
      anyOf:
      - $ref: '#/components/schemas/SMS_Price_Check___Single_Phone'
      - $ref: '#/components/schemas/SMS_Price_Check___Multiple_Phones'
      description: "Request to calculate SMS price without sending the message. Supports\
        \ same three types as SMS sending: single phone, multiple phones, or OTP."
      discriminator:
        mapping:
          phone: '#/components/schemas/SmsPriceCheckRequest/anyOf/0'
          phones: '#/components/schemas/SmsPriceCheckRequest/anyOf/1'
        propertyName: destination
      title: SMS Price Check Request
    SmsMassStatusRequest:
      description: Request to check status for multiple SMS messages by their IDs
      example:
        ids:
        - 123
        - 124
        - 125
      properties:
        ids:
          description: Array of message IDs to check status for
          example:
          - 123
          - 124
          - 125
          items:
            description: Message ID
            minimum: 1
            type: integer
          maxItems: 100
          minItems: 1
          type: array
      required:
      - ids
      title: SMS Mass Status Request
      type: object
    Sms2WayIncomingRequest:
      description: Request to retrieve incoming 2-way SMS messages for a date range
      properties:
        start_date:
          description: Start date and time for message retrieval (Y-m-d H:i:s format)
          format: date-time
          pattern: "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"
          type: string
        end_date:
          description: End date and time for message retrieval (Y-m-d H:i:s format)
          format: date-time
          pattern: "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"
          type: string
        sender:
          description: Filter by specific sender (optional)
          example: BSG
          maxLength: 15
          minLength: 3
          nullable: true
          type: string
      required:
      - end_date
      - start_date
      title: SMS 2-Way Incoming Messages Request
      type: object
    SmsCreateResponse:
      anyOf:
      - $ref: '#/components/schemas/SMS_Single_Response'
      - $ref: '#/components/schemas/SMS_Multiple_Response'
      - $ref: '#/components/schemas/SMS_Task_Response'
    SmsPricesListResponse:
      description: Response containing SMS pricing information for different countries
        and operators
      example:
        errorDescription: No errors
        error: 0
        prices:
        - country: UA
          mnc: "0"
          price: "0.0500000"
          country_name: Ukraine
          currency: USD
          type: sms
          mcc: "255"
        - country: UA
          mnc: "0"
          price: "0.0500000"
          country_name: Ukraine
          currency: USD
          type: sms
          mcc: "255"
      properties:
        error:
          description: "Error code: 0 for success, non-zero for various error conditions"
          example: 0
          minimum: 0
          title: ErrorCode
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          maxLength: 255
          title: ErrorDescription
          type: string
        prices:
          description: Array of SMS pricing information
          items:
            $ref: '#/components/schemas/PriceInfo'
          title: SmsPricesList
          type: array
      required:
      - error
      - errorDescription
      - prices
      title: SmsPricesResult
      type: object
    SmsStatusResponse:
      description: SMS message status and delivery information
      example:
        reference: unique_ref_123
        errorDescription: No errors
        time_sent: 2000-01-23T04:56:07.000+00:00
        price: 0.05
        time_in: 2000-01-23T04:56:07.000+00:00
        currency: USD
        id: "12345"
        error: 0
        msisdn: "380953227271"
        time_dr: 2000-01-23T04:56:07.000+00:00
        status: delivered
      properties:
        error:
          description: "Error code: 0 for success, 20 for \"SMS not found\""
          example: 0
          minimum: 0
          title: ErrorCode
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          maxLength: 255
          title: ErrorDescription
          type: string
        id:
          description: Internal message ID assigned by SMS Gateway
          example: "12345"
          pattern: "^[0-9]+$"
          title: MessageId
          type: string
        msisdn:
          description: Destination phone number in international format
          example: "380953227271"
          pattern: "^[1-9][0-9]{7,14}$"
          title: PhoneNumber
          type: string
        reference:
          description: External reference ID provided during creation
          example: unique_ref_123
          maxLength: 50
          title: MessageReference
          type: string
        time_in:
          description: Timestamp when message was received
          format: date-time
          title: TimeReceived
          type: string
        time_sent:
          description: Timestamp when message was sent to operator
          format: date-time
          nullable: true
          title: TimeSent
          type: string
        time_dr:
          description: Timestamp when delivery report was received
          format: date-time
          nullable: true
          title: TimeDeliveryReport
          type: string
        status:
          description: Current message status in delivery pipeline
          enum:
          - new
          - waiting
          - sent
          - delivered
          - failed
          - rejected
          - expired
          - deleted
          - unknown
          example: delivered
          title: MessageStatus
          type: string
        price:
          description: Actual cost charged for this message
          example: 0.05
          minimum: 0
          title: MessageCost
          type: number
        currency:
          description: Currency code for the price
          example: USD
          pattern: "^[A-Z]{3}$"
          title: MessageCurrency
          type: string
      required:
      - error
      - errorDescription
      title: SmsStatusResult
      type: object
    SmsBalanceResponse:
      description: Response containing account balance information
      example:
        amount: "98.9000000"
        errorDescription: No errors
        limit: "0"
        currency: USD
        error: 0
      properties:
        error:
          description: "Error code: 0 for success"
          example: 0
          minimum: 0
          title: ErrorCode
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          maxLength: 255
          title: ErrorDescription
          type: string
        amount:
          description: Current account balance with high precision
          example: "98.9000000"
          pattern: "^[0-9]+\\.[0-9]{7}$"
