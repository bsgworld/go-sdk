          title: TaskValidity
          type: integer
        totalprice:
          description: Total cost for all messages in task
          example: 5.25
          title: TaskTotalPrice
          type: number
        currency:
          description: Currency code according to ISO-4217
          example: USD
          pattern: "^[A-Z]{3}$"
          title: TaskCurrency
          type: string
        sent:
          description: Number of messages submitted to operators
          example: 100
          minimum: 0
          title: MessagesSent
          type: integer
        total:
          description: Total number of messages in task
          example: 100
          minimum: 0
          title: MessagesTotal
          type: integer
        queued:
          description: Number of messages still in queue
          example: 0
          minimum: 0
          title: MessagesQueued
          type: integer
        accepted:
          description: Number of messages accepted by operators
          example: 95
          minimum: 0
          title: MessagesAccepted
          type: integer
        enroute:
          description: Number of messages en route to destination
          example: 3
          minimum: 0
          title: MessagesEnroute
          type: integer
        delivered:
          description: Number of successfully delivered messages
          example: 92
          minimum: 0
          title: MessagesDelivered
          type: integer
        expired:
          description: Number of expired messages
          example: 2
          minimum: 0
          title: MessagesExpired
          type: integer
        undeliverable:
          description: Number of undeliverable messages
          example: 3
          minimum: 0
          title: MessagesUndeliverable
          type: integer
        unknown:
          description: Number of messages with unknown status
          example: 0
          minimum: 0
          title: MessagesUnknown
          type: integer
      required:
      - error
      - errorDescription
      title: SmsTaskStatusResult
      type: object
    SmsPriceCheckResponse:
      description: Response containing SMS price calculation without sending the message
      example:
        errorDescription: No errors
        totalprice: 0.05
        currency: USD
        error: 0
      properties:
        error:
          description: "Error code: 0 for success. Common errors: 1=Invalid phone,\
            \ 7=Invalid originator, 24=Invalid payload JSON, 14=Not enough balance,\
            \ 15=Invalid price grid"
          example: 0
          minimum: 0
          title: ErrorCode
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          maxLength: 255
          title: ErrorDescription
          type: string
        totalprice:
          description: Total calculated price for the SMS message(s) that would be
            sent
          example: 0.05
          minimum: 0
          title: TotalPrice
          type: number
        currency:
          description: Currency code according to ISO-4217 standard
          example: USD
          maxLength: 3
          minLength: 3
          pattern: "^[A-Z]{3}$"
          title: PriceCurrency
          type: string
      required:
      - currency
      - error
      - errorDescription
      - totalprice
      title: SmsPriceCheckResult
      type: object
    Sms2WayIncomingResponse:
      description: Response containing incoming 2-way SMS messages
      example:
        result:
        - sender: BSG
          time_received: 2025-01-01 12:00:00
          recipient: "380953227271"
          id: 123
          message: "Hello, this is incoming message"
        - sender: BSG
          time_received: 2025-01-01 12:00:00
          recipient: "380953227271"
          id: 123
          message: "Hello, this is incoming message"
        errorDescription: No errors
        total_count: 25
        error: 0
      properties:
        error:
          description: "Error code: 0 for success, 35 for inactive 2way SMS service"
          example: 0
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          type: string
        result:
          description: Array of incoming messages
          items:
            $ref: '#/components/schemas/Sms2WayIncomingResponse_result_inner'
