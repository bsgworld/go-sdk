components:
  schemas:
    SuccessResponse:
      description: Generic success response
      example:
        data: "{}"
        status: success
      properties:
        status:
          description: Operation status
          example: success
          type: string
        data:
          description: Response data object with operation-specific fields
          type: object
      type: object
    ErrorResponse:
      description: "Error response. NOTE: API always returns HTTP 200, errors are\
        \ indicated by non-zero error field in response body."
      properties:
        error:
          description: "Error code: 0 = success, non-zero = error. Common codes: 1=Unknown,\
            \ 2=Invalid API key, 3=Not enough params, 4=Account blocked, 5=Invalid\
            \ request, 7=Wrong parameters, 8=Not enough money"
          example: 2
          type: integer
        errorDescription:
          description: Human-readable error description
          example: Invalid API key
          type: string
      required:
      - error
      - errorDescription
      type: object
    HttpError500Response:
      description: Internal Server Error - An unexpected error occurred on the server
      example:
        code: 500
        message: An internal error occurred
      properties:
        code:
          description: HTTP status code
          example: 500
          type: integer
        message:
          description: Error message
          example: An internal error occurred
          type: string
      type: object
    BalanceResponse:
      description: Account balance information
      example:
        amount: "100.50"
        errorDescription: No errors
        limit: "0.00"
        currency: USD
        error: 0
      properties:
        error:
          description: Error code (0 = success)
          example: 0
          type: integer
        errorDescription:
          description: Human-readable error description
          example: No errors
          type: string
        amount:
          description: Current account balance
          example: "100.50"
          type: string
        currency:
          description: Currency code (ISO 4217)
          example: USD
          pattern: "^[A-Z]{3}$"
          type: string
        limit:
          description: Credit limit for the account
          example: "0.00"
          type: string
      required:
      - error
      - errorDescription
