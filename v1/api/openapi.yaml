    ExportCreateRequest:
      description: "Request to create data export. Provide either message_id array\
        \ OR filter parameters (not both). Upload data is stored on the server for\
        \ one month from the creation date. One client can only have 2 active exports\
        \ on the server. To create a new one, a previous export must be deleted. A\
        \ parameter with empty string value equals an unspecified parameter."
      example:
        time_sent_from: 2000-01-23T04:56:07.000+00:00
        time_in_to: 2000-01-23T04:56:07.000+00:00
        message_id:
        - 123456
        - 789012
        source_type: ""
        message_type: sms
        originator: testsms
        sl_clicks: ""
        sl_clicks_count: ""
        sl_clicks_comp: ""
        time_sent_to: 2000-01-23T04:56:07.000+00:00
        msisdn:
        - "380952348298"
        time_in_from: 2000-01-23T04:56:07.000+00:00
        country_id: UA
      properties:
        message_id:
          description: "Array of message IDs to export. If provided, ALL other parameters\
            \ must be empty."
          example:
          - 123456
          - 789012
          items:
            type: integer
          type: array
        msisdn:
          description: Phone numbers in international format to filter by
          example:
          - "380952348298"
          items:
            type: string
          type: array
        originator:
          description: Filter by sender/originator name
          example: testsms
          type: string
        source_type:
          description: "Filter by message source type (e.g. api, smpp). Empty string\
            \ = not specified."
          example: ""
          type: string
        message_type:
          description: Filter by message type
          enum:
          - sms
          - viber
          - hlr
          example: sms
          type: string
        time_in_from:
          description: Start of message received date range (ISO 8601 format)
          format: date-time
          type: string
        time_in_to:
          description: End of message received date range (must be >= time_in_from)
          format: date-time
          type: string
        time_sent_from:
          description: Start of message sent date range (ISO 8601 format)
