        tariff:
          description: Specific tariff code to use for pricing this message. Optional
            - uses user's default tariff if not specified. Must be a valid tariff
            code available to your account
          example: 9
          maximum: 999
          minimum: 1
          title: TariffCode
          type: integer
        scheduledDatetime:
          description: "Schedule message delivery for future time. Must be in UTC\
            \ format (ISO 8601). Example: 2024-12-25T10:30:00Z. If not specified,\
            \ message is sent immediately"
          example: 2024-12-25T10:30:00Z
          format: date-time
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
          title: ScheduledSendTime
          type: string
        data_coding_ucs2:
