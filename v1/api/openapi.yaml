      security:
      - ApiKeyAuth: []
      summary: Get task status
      tags:
      - sms_task_status
  /rest/sms/reference/{reference}:
    get:
      description: Get SMS delivery status using external reference ID
      operationId: smsGetStatusByExtId
      parameters:
      - description: External reference ID
        example: unique_ref_123
        explode: false
        in: path
        name: reference
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                success:
                  summary: Successful response
                  value:
                    error: 0
                    errorDescription: No errors
                    status: delivered
                    reference: unique_ref_123
                error:
                  summary: Error response
                  value: 0
              schema:
                $ref: '#/components/schemas/SmsStatusResponse'
          description: Successful response
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Get SMS status by reference
      tags:
      - sms_status_by_ref
  /rest/sms/prices:
    get:
      description: Retrieve SMS pricing for all available destinations
      operationId: smsGetPrices
      responses:
        "200":
          content:
            application/json:
              examples:
                success:
                  summary: Successful response
                  value:
                    error: 0
                    errorDescription: No errors
                    prices:
                    - country: UA
                      price: 0.05
                      currency: USD
                error:
                  summary: Error response
                  value: 0
              schema:
                $ref: '#/components/schemas/SmsPricesListResponse'
          description: Successful response
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Get SMS pricing
      tags:
      - sms_prices
  /rest/sms/balance:
    get:
      description: Get current account balance and credit information
      operationId: smsGetBalance
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsBalanceResponse'
          description: Successful response
        "500":
          content:
