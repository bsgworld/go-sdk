paths:
  /rest/sms/create:
    post:
      description: Send SMS message to one or multiple recipients
      operationId: smsCreateObjects
      requestBody:
        content:
          application/json:
            examples:
              single_phone:
                description: Send SMS to single recipient
                summary: Single phone SMS
                value:
                  destination: phone
                  msisdn: "380953227271"
                  originator: testsms
                  body: k TEST Hello12 SMS 1115222
                  reference: "1737033400123"
                  validity: 72
                  callback_url: https://webhook.site/wh-delivery-reports
                  "2way": 0
                  transliterate: false
              multiple_phones:
                description: Send SMS to multiple recipients
                summary: Multiple phones SMS
                value:
                  destination: phones
                  phones:
                  - msisdn: "380953227271"
                    reference: ref_001
                  - msisdn: "380953227272"
                    reference: ref_002
                  originator: BSG
                  body: Bulk SMS message
                  reference: bulk_ref_123
                  callback_url: https://webhook.site/wh-delivery-reports
                  transliterate: false
                  validity: 72
                  "2way": 0
              individual_phones:
                description: Send SMS with individual content per recipient
                summary: Individual customized SMS
                value:
                  destination: individual
                  phones:
                  - msisdn: "380953227271"
                    originator: BSG
                    body: Hello John! Your personal message.
                    reference: john_ref_001
                  - msisdn: "380953227272"
                    originator: Support
                    body: Hi Mary! Your account update.
                    reference: mary_ref_002
                  reference: individual_batch_ref_123
                  callback_url: https://webhook.site/wh-delivery-reports
                  validity: 72
              otp_sms:
                description: Send OTP verification SMS
                summary: OTP SMS
                value:
                  destination: otp
                  msisdn: "380953227271"
                  originator: OTP
                  body: "Your verification code is: {gen_otp_09,4}"
                  reference: otp_ref_123
            schema:
              $ref: '#/components/schemas/SmsCreateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                single_phone:
                  summary: Single phone SMS response
                  value:
                    result:
                      error: 0
                      errorDescription: No errors
                      reference: single_ref_123
                      id: "12"
                      price: 0.05
                      currency: USD
                otp_sms:
                  summary: OTP SMS response (with generated code)
                  value:
                    result:
                      error: 0
                      errorDescription: No errors
                      reference: test_otp_001
                      id: "3272825589"
                      price: 1.1
                      currency: EUR
                      otp_code: "3123"
                multiple_phones:
                  summary: Multiple phones SMS response (Task)
                  value:
                    task_id: "1"
                    result:
                    - error: 0
                      errorDescription: No errors
                      reference: ref_001
                      id: "13"
                      price: 0.05
                      currency: USD
                    - error: 0
                      errorDescription: No errors
                      reference: ref_002
                      id: "14"
                      price: 0.05
                      currency: USD
                    total_price: 0.1
                    currency: USD
                individual_phones:
                  summary: Individual customized SMS response
                  value:
                    result:
                    - error: 0
                      errorDescription: No errors
                      reference: john_ref_001
                      id: "15"
                      price: 0.05
                      currency: USD
                    - error: 0
                      errorDescription: No errors
                      reference: mary_ref_002
                      id: "16"
                      price: 0.05
                      currency: USD
                    total_price: 0.1
                    currency: USD
              schema:
                $ref: '#/components/schemas/SmsCreateResponse'
          description: API Response - All responses return HTTP 200 with error details
            in JSON body
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Send SMS message
      tags:
      - sms_create
    put:
      description: Send SMS message to one or multiple recipients using PUT method
      operationId: smsCreateObjectsPut
      requestBody:
        content:
          application/json:
            examples:
              single_phone:
                description: Send SMS to single recipient
                summary: Single phone SMS
                value:
                  destination: phone
                  msisdn: "380953227271"
                  originator: testsms
                  body: k TEST Hello12 SMS 1115222
                  reference: "1737033400123"
                  validity: 72
                  callback_url: https://webhook.site/wh-delivery-reports
                  "2way": 0
                  transliterate: false
              multiple_phones:
                description: Send SMS to multiple recipients
                summary: Multiple phones SMS
                value:
                  destination: phones
                  phones:
                  - msisdn: "380953227271"
                    reference: ref_001
                  - msisdn: "380953227272"
                    reference: ref_002
                  originator: BSG
                  body: Bulk SMS message
                  reference: bulk_ref_123
                  callback_url: https://webhook.site/wh-delivery-reports
                  transliterate: false
                  validity: 72
                  "2way": 0
              individual_phones:
                description: Send SMS with individual content per recipient
                summary: Individual customized SMS
                value:
                  destination: individual
                  phones:
                  - msisdn: "380953227271"
                    originator: BSG
                    body: Hello John! Your personal message.
                    reference: john_ref_001
                  - msisdn: "380953227272"
                    originator: Support
                    body: Hi Mary! Your account update.
                    reference: mary_ref_002
                  reference: individual_batch_ref_123
                  callback_url: https://webhook.site/wh-delivery-reports
                  validity: 72
              otp_sms:
                description: Send OTP verification SMS
                summary: OTP SMS
                value:
                  destination: otp
                  msisdn: "380953227271"
                  originator: OTP
                  body: "Your verification code is: {gen_otp_09,4}"
                  reference: otp_ref_123
            schema:
              $ref: '#/components/schemas/SmsCreateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                single_phone:
                  summary: Single phone SMS response
                  value:
                    result:
                      error: 0
                      errorDescription: No errors
                      reference: single_ref_123
                      id: "12"
                      price: 0.05
                      currency: USD
                otp_sms:
                  summary: OTP SMS response (with generated code)
                  value:
                    result:
                      error: 0
                      errorDescription: No errors
                      reference: test_otp_001
                      id: "3272825589"
                      price: 1.1
                      currency: EUR
                      otp_code: "3123"
                multiple_phones:
                  summary: Multiple phones SMS response (Task)
                  value:
                    task_id: "1"
                    result:
                    - error: 0
                      errorDescription: No errors
                      reference: ref_001
                      id: "13"
                      price: 0.05
                      currency: USD
                    - error: 0
                      errorDescription: No errors
                      reference: ref_002
                      id: "14"
                      price: 0.05
                      currency: USD
                    total_price: 0.1
                    currency: USD
                individual_phones:
                  summary: Individual customized SMS response
                  value:
                    result:
                    - error: 0
                      errorDescription: No errors
                      reference: john_ref_001
                      id: "15"
                      price: 0.05
                      currency: USD
                    - error: 0
                      errorDescription: No errors
                      reference: mary_ref_002
                      id: "16"
                      price: 0.05
                      currency: USD
                    total_price: 0.1
                    currency: USD
              schema:
                $ref: '#/components/schemas/SmsCreateResponse'
          description: API Response - All responses return HTTP 200 with error details
            in JSON body
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Send SMS message (PUT)
      tags:
      - sms_create_put
  /rest/sms/price:
    post:
      description: Calculate SMS price without sending
      operationId: smsCheckPrice
      requestBody:
        content:
          application/json:
            examples:
              single_phone_price:
                description: Calculate price for single SMS without sending
                summary: Single phone price check
                value:
                  destination: phone
                  msisdn: "380953227271"
                  originator: BSG
                  body: Hello! This is a test message for price calculation.
                  transliterate: true
              multiple_phones_price:
                description: Calculate total price for bulk SMS without sending
                summary: Multiple phones price check
                value:
                  destination: phones
                  phones:
                  - msisdn: "380953227271"
                  - msisdn: "380953227272"
                  - msisdn: "380953227273"
                  originator: BSG
                  body: Bulk SMS message for price calculation
                  transliterate: false
            schema:
              $ref: '#/components/schemas/SmsPriceCheckRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                success:
                  summary: Successful response
                  value:
                    error: 0
                    errorDescription: No errors
                    totalprice: 0.05
                    currency: USD
              schema:
                $ref: '#/components/schemas/SmsPriceCheckResponse'
          description: Successful response
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Check SMS price
      tags:
      - sms_check_price
    put:
      description: Calculate SMS price without sending using PUT method
      operationId: smsCheckPricePut
      requestBody:
        content:
          application/json:
            examples:
              single_phone_price:
                description: Calculate price for single SMS without sending
                summary: Single phone price check
                value:
                  destination: phone
                  msisdn: "380953227271"
                  originator: BSG
                  body: Hello! This is a test message for price calculation.
                  transliterate: true
              multiple_phones_price:
                description: Calculate total price for bulk SMS without sending
                summary: Multiple phones price check
                value:
                  destination: phones
                  phones:
                  - msisdn: "380953227271"
                  - msisdn: "380953227272"
                  - msisdn: "380953227273"
                  originator: BSG
                  body: Bulk SMS message for price calculation
                  transliterate: false
            schema:
              $ref: '#/components/schemas/SmsPriceCheckRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsPriceCheckResponse'
          description: Successful response
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error - Unexpected server error
      security:
      - ApiKeyAuth: []
      summary: Check SMS price (PUT)
      tags:
      - sms_check_price_put
  /rest/sms/2wayIncoming:
    get:
      description: Retrieve incoming SMS messages for 2-way communication within specified
        date range
      operationId: smsGet2WayIncoming
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sms2WayIncomingResponse'
          description: Successful response
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error - Unexpected server error
      security:
      - ApiKeyAuth: []
      summary: Get 2-way incoming messages
      tags:
      - sms_2way_incoming
  /rest/sms/2waySenders:
    get:
      description: Get list of available senders for 2-way SMS
      operationId: smsGet2WaySenders
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
          description: Successful response
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error - Unexpected server error
      security:
      - ApiKeyAuth: []
      summary: Get 2-way senders
      tags:
      - sms_2way_senders
  /rest/sms/getStatus:
    post:
      description: Retrieve status information for multiple SMS messages by their
        IDs
      operationId: smsGetMassStatus
      requestBody:
        content:
          application/json:
            examples:
              basic_status_check:
                description: Get delivery status for a batch of SMS messages
                summary: Check status for multiple messages
                value:
                  ids:
                  - 123
                  - 124
                  - 125
              large_batch_check:
                description: Check status for up to 100 messages at once
                summary: Large batch status check
                value:
                  ids:
                  - 101
                  - 102
                  - 103
                  - 104
                  - 105
                  - 106
                  - 107
                  - 108
                  - 109
                  - 110
            schema:
              $ref: '#/components/schemas/SmsMassStatusRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                delivered_status:
                  summary: SMS with delivered status
                  value:
                    error: 0
                    errorDescription: No errors
                    id: "380953227271"
                    msisdn: "380953227271"
                    reference: ref_002
                    time_in: 2025-11-13 08:34:38
                    time_sent: 2025-11-13 08:34:38
                    time_dr: 2025-11-13 08:34:38
                    status: delivered
                    price: 0.05
                    currency: USD
                unknown_status:
                  summary: SMS with unknown status
                  value:
                    error: 0
                    errorDescription: No errors
                    id: "380953227272"
                    msisdn: "380953227272"
                    reference: ref_003
                    time_in: 2025-11-13 08:34:38
                    time_sent: 2025-11-13 08:34:38
                    time_dr: 2025-11-13 08:34:38
                    status: unknown
                    price: 0
                    currency: USD
                error:
                  summary: SMS not found error
                  value:
                    error: 20
                    errorDescription: SMS not found
              schema:
                $ref: '#/components/schemas/SmsMassStatusResponse'
          description: API Response - All responses return HTTP 200 with error details
            in JSON body
        "500":
          content:
            application/json:
              example:
                code: 500
                message: An internal error occurred
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Get status for multiple SMS messages
      tags:
      - sms_mass_status
  /rest/sms/{id}:
    get:
      description: Get SMS delivery status and details by message ID
      operationId: smsGetStatusById
      parameters:
      - description: Message ID
        example: "123456"
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsStatusResponse'
          description: Successful response
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError500Response'
          description: Internal Server Error - Unexpected server error
      security:
      - ApiKeyAuth: []
      summary: Get SMS status by ID
      tags:
      - sms_status_by_id
  /rest/sms/task/{taskId}:
    get:
      description: Get status of SMS processing task
      operationId: smsGetTaskStatus
      parameters:
      - description: Task ID
        example: "123"
        explode: false
        in: path
        name: taskId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsTaskStatusResponse'
          description: Successful response
        "500":
          content:
            application/json:
              schema:
